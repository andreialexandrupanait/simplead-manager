name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security:
    runs-on: ubuntu-latest
    name: Security Audit
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run security audit
        run: composer audit

  lint:
    runs-on: ubuntu-latest
    name: Code Style
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run Pint
        run: ./vendor/bin/pint --test

  static-analysis:
    runs-on: ubuntu-latest
    name: Static Analysis
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run Larastan
        run: ./vendor/bin/phpstan analyse --memory-limit=512M

  tests:
    runs-on: ubuntu-latest
    name: Tests

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: simplead
          POSTGRES_PASSWORD: password
          POSTGRES_DB: simplead_testing
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, redis
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Copy env
        run: cp .env.example .env

      - name: Generate key
        run: php artisan key:generate

      - name: Configure test database for CI
        run: |
          sed -i 's/name="DB_HOST" value="pgsql"/name="DB_HOST" value="127.0.0.1"/' phpunit.xml
          sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/^DB_DATABASE=.*/DB_DATABASE=simplead_testing/' .env
          sed -i 's/^DB_USERNAME=.*/DB_USERNAME=simplead/' .env
          sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=password/' .env
          sed -i 's/^REDIS_HOST=.*/REDIS_HOST=127.0.0.1/' .env

      - name: Run tests
        run: php artisan test
