name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security:
    runs-on: ubuntu-latest
    name: Security Audit
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run security audit
        run: composer audit

  lint:
    runs-on: ubuntu-latest
    name: Code Style
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run Pint
        run: ./vendor/bin/pint --test

  static-analysis:
    runs-on: ubuntu-latest
    name: Static Analysis
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run Larastan
        run: ./vendor/bin/phpstan analyse --memory-limit=512M

      - name: Check baseline size
        run: |
          if [ -f phpstan-baseline.neon ]; then
            COUNT=$(grep -c 'identifier:' phpstan-baseline.neon || true)
            echo "PHPStan baseline errors: $COUNT"
            if [ "$COUNT" -gt 0 ]; then
              echo "::error::PHPStan baseline grew to $COUNT errors (max: 0). Fix new errors instead of adding to baseline."
              exit 1
            fi
          fi

  tests:
    runs-on: ubuntu-latest
    name: Tests

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: simplead
          POSTGRES_PASSWORD: password
          POSTGRES_DB: simplead_testing
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, redis
          coverage: pcov
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Copy env
        run: cp .env.example .env

      - name: Generate key
        run: php artisan key:generate

      - name: Run tests
        run: php artisan test --coverage-text --coverage-clover=coverage.xml

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage.xml ]; then
            COVERAGE=$(php -r '$xml = simplexml_load_file("coverage.xml"); echo round((float)$xml->project->directory->totals->lines["percent"], 1);')
            echo "### Test Coverage: ${COVERAGE}%" >> $GITHUB_STEP_SUMMARY
          fi
