name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Pint & PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pgsql, redis, gd, zip, bcmath
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run Pint
        run: vendor/bin/pint --test

      - name: 'PHPStan: Models, Enums & core'
        run: >-
          vendor/bin/phpstan analyse --memory-limit=6G --debug
          app/Models app/Enums app/DTOs app/Contracts app/Events
          app/Exceptions app/Helpers app/Observers app/Policies
          app/Providers app/Rules app/View app/helpers.php

      - name: 'PHPStan: Jobs, Console & HTTP'
        run: >-
          vendor/bin/phpstan analyse --memory-limit=6G --debug
          app/Jobs app/Listeners app/Mail app/Dispatchers
          app/Console app/Http

      - name: 'PHPStan: Livewire (Sites & Traits)'
        run: >-
          vendor/bin/phpstan analyse --memory-limit=6G --debug
          app/Livewire/Sites app/Livewire/Traits

      - name: 'PHPStan: Livewire (rest)'
        run: >-
          vendor/bin/phpstan analyse --memory-limit=6G --debug
          app/Livewire/Activity app/Livewire/Backups app/Livewire/Clients
          app/Livewire/Components app/Livewire/Dashboard app/Livewire/Dns
          app/Livewire/ErrorLogs app/Livewire/Forms app/Livewire/Notifications
          app/Livewire/Performance app/Livewire/Reports app/Livewire/Security
          app/Livewire/Seo app/Livewire/Settings app/Livewire/StatusPages
          app/Livewire/Updates app/Livewire/Uptime
          app/Livewire/MaintenancePlans.php

      - name: 'PHPStan: Services'
        run: vendor/bin/phpstan analyse --memory-limit=6G --debug app/Services

  test:
    name: PHPUnit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: simplead_test
          POSTGRES_USER: simplead
          POSTGRES_PASSWORD: testing
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pgsql, redis, gd, zip, bcmath
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        env:
          APP_ENV: testing
          APP_KEY: base64:dGVzdGluZ2tleXRoYXRpczMyYnl0ZXNsb25nISE=
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: simplead_test
          DB_USERNAME: simplead
          DB_PASSWORD: testing
          CACHE_STORE: array
          QUEUE_CONNECTION: sync
          SESSION_DRIVER: array
          REDIS_HOST: 127.0.0.1
        run: vendor/bin/phpunit
