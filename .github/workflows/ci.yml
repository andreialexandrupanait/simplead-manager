name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Pint (code style)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: Pint (test mode, no fixes)
        run: vendor/bin/pint --test

  static:
    name: PHPStan (static analysis)
    runs-on: ubuntu-latest
    # Blocking since 2026-07: the >4GB blow-up was an infinite container
    # recursion (AppBackupService <-> AppBackupRestorer circular constructor
    # dependency, now fixed) and phpstan.neon now recycles workers per 8-file
    # job, so a full run completes within ~1.5GB per worker.
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=4G

  test:
    name: PHPUnit (pgsql + redis)
    runs-on: ubuntu-latest
    # Blocking since 2026-07: suite verified green via bin/test.
    # Cap the job so a non-hermetic test (real network call with no timeout)
    # can't hang the runner indefinitely (tracked as remediation item 2.10).
    # Raised 15→25 on 2026-07-12: the suite grew past 500 tests (~12m local,
    # ~15m+ on the slower CI runner) and was tripping the 15m cap; 25m gives
    # headroom for continued P2/P3 test growth without masking a real hang.
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: simplead_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      APP_ENV: testing
      APP_KEY: base64:mjmS7eMvOldHZkbWiIfbfp9VD+ByQ6qANsIE2TouIsw=
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: simplead_test
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pgsql, pdo_pgsql, redis, gd, zip, bcmath, intl, mbstring, exif
          tools: composer:v2
          coverage: none
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: Migrate test database (uses schema dump)
        run: php artisan migrate --force --no-interaction
      - name: PHPUnit
        run: vendor/bin/phpunit --no-coverage

  audit:
    name: Composer audit (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: Composer audit
        run: composer audit --no-dev
