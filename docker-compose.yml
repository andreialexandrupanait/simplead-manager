services:
    pgsql:
        image: postgres:16
        ports:
            - '5432:5432'
        environment:
            POSTGRES_DB: simplead_manager
            POSTGRES_USER: simplead
            POSTGRES_PASSWORD: secret
        volumes:
            - simplead-pgsql:/var/lib/postgresql/data
        networks:
            - simplead
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U simplead -d simplead_manager"]
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        ports:
            - '6379:6379'
        volumes:
            - simplead-redis:/data
        networks:
            - simplead
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

networks:
    simplead:
        driver: bridge

volumes:
    simplead-pgsql:
        external: true
        name: simplead-manager_pgsql_data
    simplead-redis:
        external: true
        name: simplead-manager_redis_data
