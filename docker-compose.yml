services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    image: simplead-app:dev
    container_name: simplead-app-dev
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      # Mount entire codebase for live editing (includes storage, vendor, node_modules)
      - .:/var/www/html
    networks:
      - simplead
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy

  horizon:
    image: simplead-app:dev
    container_name: simplead-horizon-dev
    env_file:
      - .env
    restart: unless-stopped
    command: php artisan horizon
    healthcheck:
      disable: true
    stop_grace_period: 30s
    volumes:
      - .:/var/www/html
    networks:
      - simplead
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    image: simplead-app:dev
    container_name: simplead-scheduler-dev
    env_file:
      - .env
    restart: unless-stopped
    command: php artisan schedule:work
    healthcheck:
      disable: true
    volumes:
      - .:/var/www/html
    networks:
      - simplead
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: simplead-nginx-dev
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d/app.conf:/etc/nginx/templates/http.conf:ro
      - ./docker/nginx/conf.d.disabled/app.conf:/etc/nginx/templates/ssl.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - simplead-certbot:/var/www/certbot
    command: >
      sh -c '
      rm -f /etc/nginx/conf.d/default.conf;
      if [ -f /etc/letsencrypt/live/manager.simplead.ro/fullchain.pem ]; then
        cp /etc/nginx/templates/ssl.conf /etc/nginx/conf.d/app.conf;
        echo "SSL certificates found - HTTPS enabled";
      else
        cp /etc/nginx/templates/http.conf /etc/nginx/conf.d/app.conf;
        echo "No SSL certificates - HTTP only";
      fi;
      exec nginx -g "daemon off;"
      '
    networks:
      - simplead
    depends_on:
      app:
        condition: service_started

  certbot:
    image: certbot/certbot
    container_name: simplead-certbot-dev
    restart: unless-stopped
    entrypoint: >
      sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - simplead-certbot:/var/www/certbot

  pgsql:
    image: postgres:16-alpine
    container_name: simplead-pgsql-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: simplead_manager
      POSTGRES_USER: simplead
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - work_mem=4MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - effective_cache_size=512MB
      - -c
      - max_connections=100
      - -c
      - random_page_cost=1.1
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - wal_buffers=16MB
      - -c
      - log_min_duration_statement=1000
      - -c
      - password_encryption=scram-sha-256
    volumes:
      - simplead-pgsql:/var/lib/postgresql/data
    networks:
      - simplead
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simplead -d simplead_manager"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: simplead-redis-dev
    restart: unless-stopped
    command: >
      sh -c '
      ARGS="--maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes --appendfsync everysec";
      if [ -n "$$REDIS_PASSWORD" ]; then ARGS="--requirepass $$REDIS_PASSWORD $$ARGS"; fi;
      exec redis-server $$ARGS
      '
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli $${REDIS_PASSWORD:+-a $$REDIS_PASSWORD --no-auth-warning} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - simplead-redis:/data
    networks:
      - simplead

networks:
  simplead:
    driver: bridge

volumes:
  simplead-pgsql:
    external: true
    name: simplead-manager_pgsql_data
  simplead-redis:
    external: true
    name: simplead-manager_redis_data
  simplead-certbot:
    external: true
    name: simplead-manager_certbot_data
