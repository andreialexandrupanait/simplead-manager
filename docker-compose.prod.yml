
services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    image: simplead-app:latest
    container_name: simplead-app
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "SCRIPT_NAME=/fpm-ping SCRIPT_FILENAME=/fpm-ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      - app-storage:/var/www/html/storage
    networks:
      - simplead
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  horizon:
    image: simplead-app:latest
    container_name: simplead-horizon
    env_file:
      - .env
    restart: unless-stopped
    command: php artisan horizon
    healthcheck:
      test: ["CMD-SHELL", "php artisan horizon:status | grep -q running"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    stop_grace_period: 30s
    volumes:
      - app-storage:/var/www/html/storage
    networks:
      - simplead
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"

  scheduler:
    image: simplead-app:latest
    container_name: simplead-scheduler
    env_file:
      - .env
    restart: unless-stopped
    command: php artisan schedule:work
    healthcheck:
      test: ["CMD-SHELL", "php -r 'echo 1;'"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - app-storage:/var/www/html/storage
    networks:
      - simplead
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  nginx:
    image: nginx:alpine
    container_name: simplead-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - .:/var/www/html:ro
      - app-storage:/var/www/html/storage:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d/app.conf:/etc/nginx/templates/http.conf:ro
      - ./docker/nginx/conf.d.disabled/app.conf:/etc/nginx/templates/ssl.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - simplead-certbot:/var/www/certbot
    command: >
      sh -c '
      rm -f /etc/nginx/conf.d/default.conf;
      if [ -f /etc/letsencrypt/live/manager.simplead.ro/fullchain.pem ]; then
        cp /etc/nginx/templates/ssl.conf /etc/nginx/conf.d/app.conf;
        echo "SSL certificates found - HTTPS enabled";
      else
        cp /etc/nginx/templates/http.conf /etc/nginx/conf.d/app.conf;
        echo "No SSL certificates - HTTP only";
      fi;
      exec nginx -g "daemon off;"
      '
    networks:
      - simplead
    depends_on:
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  certbot:
    image: certbot/certbot
    container_name: simplead-certbot
    restart: unless-stopped
    entrypoint: >
      sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - simplead-certbot:/var/www/certbot
    networks:
      - simplead
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.1"

  pgsql:
    image: postgres:16-alpine
    container_name: simplead-pgsql
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - work_mem=8MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - effective_cache_size=1536MB
      - -c
      - max_connections=100
      - -c
      - random_page_cost=1.1
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - wal_buffers=16MB
      - -c
      - log_min_duration_statement=1000
      - -c
      - password_encryption=scram-sha-256
    volumes:
      - simplead-pgsql:/var/lib/postgresql/data
    networks:
      - simplead
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simplead -d simplead_manager"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: "1.0"

  # Connection pooler — app containers connect here instead of directly to pgsql.
  # Set DB_HOST=pgbouncer in .env when enabling this service.
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: simplead-pgbouncer
    restart: unless-stopped
    environment:
      DB_USER: "${DB_USERNAME}"
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_HOST: pgsql
      DB_NAME: "${DB_DATABASE}"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 3
      SERVER_IDLE_TIMEOUT: 600
      SERVER_LIFETIME: 3600
      LOG_CONNECTIONS: 0
      LOG_DISCONNECTIONS: 0
      AUTH_TYPE: scram-sha-256
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U simplead"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - simplead
    depends_on:
      pgsql:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"

  redis:
    image: redis:7-alpine
    container_name: simplead-redis
    restart: unless-stopped
    command: >
      sh -c '
      ARGS="--maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes --appendfsync everysec";
      if [ -n "$$REDIS_PASSWORD" ]; then ARGS="--requirepass $$REDIS_PASSWORD $$ARGS"; fi;
      exec redis-server $$ARGS
      '
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli $${REDIS_PASSWORD:+-a $$REDIS_PASSWORD --no-auth-warning} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - simplead-redis:/data
    networks:
      - simplead
    deploy:
      resources:
        limits:
          memory: 320M
          cpus: "0.5"

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: simplead-gotenberg
    restart: unless-stopped
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--api-timeout=120s"
      - "--log-level=warn"
      - "--api-health-uri=/health"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - simplead
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

networks:
  simplead:
    driver: bridge

volumes:
  simplead-pgsql:
    external: true
    name: simplead-manager_pgsql_data
  simplead-redis:
    external: true
    name: simplead-manager_redis_data
  simplead-certbot:
    external: true
    name: simplead-manager_certbot_data
  app-storage:
    external: true
    name: simplead-manager_app-storage
