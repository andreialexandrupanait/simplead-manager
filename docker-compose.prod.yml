
services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
      target: app
    image: simplead-app:latest
    container_name: simplead-app
    entrypoint: ["/var/www/html/docker/php/entrypoint.sh"]
    command: ["php-fpm"]
    env_file:
      - .env
    environment:
      # Direct Postgres (bypasses PgBouncer) — used only by the pgsql_direct
      # connection for migrations/DDL. See config/database.php + deploy.sh.
      DB_DIRECT_HOST: pgsql
      DB_DIRECT_PORT: "5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "SCRIPT_NAME=/fpm-ping SCRIPT_FILENAME=/fpm-ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      - app-storage:/var/www/html/storage
    networks:
      - simplead
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    read_only: true
    # Writable tmpfs mounts for paths that FPM / Laravel need at runtime.
    # storage/ is a named volume so it is NOT read-only.
    # bootstrap/cache is tmpfs so artisan optimize can write cached config/routes/views.
    tmpfs:
      - /tmp:size=64M,mode=1777
      - /var/run:size=8M
      - /var/www/html/bootstrap/cache:size=16M,uid=1000,gid=1000
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  horizon:
    image: simplead-app:latest
    container_name: simplead-horizon
    env_file:
      - .env
    environment:
      # Use storage volume for temp files instead of tmpfs (backup downloads can be >1GB)
      TMPDIR: /var/www/html/storage/app/temp
    restart: unless-stopped
    entrypoint: ["/var/www/html/docker/php/entrypoint.sh"]
    command: ["php", "artisan", "horizon"]
    healthcheck:
      test: ["CMD-SHELL", "php artisan horizon:status | grep -q running"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    # Give Horizon workers time to finish in-flight jobs before SIGKILL.
    # Must exceed the longest job timeout: RestoreBackup/backups run up to
    # 3600s (see app/Jobs/RestoreBackup.php). A shorter grace lets a deploy
    # SIGKILL a restore mid-flight and leave a client site half-written.
    stop_grace_period: 3660s
    volumes:
      - app-storage:/var/www/html/storage
    networks:
      - simplead
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=512M,mode=1777
      - /var/run:size=8M
      - /var/www/html/bootstrap/cache:size=16M,uid=1000,gid=1000
    deploy:
      resources:
        limits:
          # P1-06: the container hard limit must exceed the summed per-worker
          # memory *restart thresholds* (config/horizon.php) — those are graceful
          # self-restart hints, NOT caps, so real RSS can reach their sum before
          # any worker recycles. Below that sum a burst of concurrent large jobs
          # trips a cgroup OOM SIGKILL mid-backup/restore (the exact failure
          # stop_grace_period was added to prevent).
          #
          # Production sum (maxProcesses x memory):
          #   uptime            2 x 64   =  128
          #   sync              3 x 256  =  768
          #   backups           3 x 1024 = 3072
          #   notifications     3 x 64   =  192
          #   general           3 x 512  = 1536
          #   incident-response 2 x 512  = 1024
          #   subtotal                   = 6720
          #   + master (memory_limit 64) = 6784 MB
          # 8192M leaves ~1.4G headroom. If worker counts (HORIZON_*_WORKERS) or
          # per-worker `memory` change, revisit this. Confirm the host has the
          # RAM before applying (see PR safe-rollout note).
          memory: 8192M
          cpus: "1.0"

  scheduler:
    image: simplead-app:latest
    container_name: simplead-scheduler
    env_file:
      - .env
    restart: unless-stopped
    entrypoint: ["/var/www/html/docker/php/entrypoint.sh"]
    command: ["php", "artisan", "schedule:work"]
    # P1-53: let schedule:work finish the current tick and release its overlap
    # mutexes on SIGTERM instead of being SIGKILL'd after Docker's default 10s.
    # A killed scheduler that never releases a mutex would wedge that task for the
    # framework-default 24h; paired with the 10-min mutex TTLs in routes/console.php
    # this keeps a bad deploy/host-OOM from silently freezing scheduled work.
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "php -r 'echo 1;'"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - app-storage:/var/www/html/storage
    networks:
      - simplead
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
      - /var/run:size=8M
      - /var/www/html/bootstrap/cache:size=16M,uid=1000,gid=1000
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  nginx:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
      target: nginx
    image: simplead-nginx:latest
    container_name: simplead-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - app-storage:/var/www/html/storage:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - simplead-certbot:/var/www/certbot
    command: >
      sh -c '
      rm -f /etc/nginx/conf.d/default.conf;
      if [ -f /etc/letsencrypt/live/manager.simplead.ro/fullchain.pem ]; then
        cp /etc/nginx/templates/ssl.conf /etc/nginx/conf.d/app.conf;
        echo "SSL certificates found - HTTPS enabled";
      else
        cp /etc/nginx/templates/http.conf /etc/nginx/conf.d/app.conf;
        echo "No SSL certificates - HTTP only";
      fi;
      exec nginx -g "daemon off;"
      '
    networks:
      - simplead
    depends_on:
      app:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  certbot:
    image: certbot/certbot
    container_name: simplead-certbot
    restart: unless-stopped
    entrypoint: >
      sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - simplead-certbot:/var/www/certbot
    networks:
      - simplead
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.1"

  pgsql:
    image: postgres:16-alpine
    container_name: simplead-pgsql
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - work_mem=8MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - effective_cache_size=1536MB
      # Reduced from 100 — PgBouncer sits in front; direct connections are only
      # for admin/maintenance tasks.  Fewer connections = less memory overhead.
      - -c
      - max_connections=50
      - -c
      - random_page_cost=1.1
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - wal_buffers=16MB
      - -c
      - log_min_duration_statement=1000
      - -c
      - password_encryption=scram-sha-256
    volumes:
      - simplead-pgsql:/var/lib/postgresql/data
    networks:
      - simplead
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: "1.0"

  # Connection pooler — app containers connect here instead of directly to pgsql.
  # Set DB_HOST=pgbouncer in .env when enabling this service.
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: simplead-pgbouncer
    restart: unless-stopped
    environment:
      DB_USER: "${DB_USERNAME}"
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_HOST: pgsql
      DB_NAME: "${DB_DATABASE}"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 3
      SERVER_IDLE_TIMEOUT: 600
      SERVER_LIFETIME: 3600
      LOG_CONNECTIONS: 0
      LOG_DISCONNECTIONS: 0
      AUTH_TYPE: scram-sha-256
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - simplead
    depends_on:
      pgsql:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"

  redis:
    image: redis:7-alpine
    container_name: simplead-redis
    restart: unless-stopped
    command: >
      sh -c '
      ARGS="--maxmemory 256mb --maxmemory-policy volatile-lru --appendonly yes --appendfsync everysec";
      if [ -n "$$REDIS_PASSWORD" ]; then ARGS="--requirepass $$REDIS_PASSWORD $$ARGS"; fi;
      exec redis-server $$ARGS
      '
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli $${REDIS_PASSWORD:+-a $$REDIS_PASSWORD --no-auth-warning} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - simplead-redis:/data
    networks:
      - simplead
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 320M
          cpus: "0.5"

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: simplead-gotenberg
    restart: unless-stopped
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--api-timeout=120s"
      - "--log-level=warn"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - simplead
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

networks:
  simplead:
    driver: bridge

volumes:
  simplead-pgsql:
    external: true
    name: simplead-manager_pgsql_data
  simplead-redis:
    external: true
    name: simplead-manager_redis_data
  simplead-certbot:
    external: true
    name: simplead-manager_certbot_data
  app-storage:
    external: true
    name: simplead-manager_app-storage
