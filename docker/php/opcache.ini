[opcache]
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
; validate_timestamps=0 requires an image rebuild to pick up code changes (correct for production)
opcache.validate_timestamps=0
opcache.save_comments=1
; fast_shutdown was removed in PHP 8.0 — setting it has no effect and emits a notice
; opcache.fast_shutdown=1
opcache.jit_buffer_size=128M
; Explicitly enable JIT for maximum throughput (tracing mode)
opcache.jit=tracing
