[www]
user = appuser
group = appuser

listen = 0.0.0.0:9000

; Process management
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500

; Health check
pm.status_path = /fpm-status
ping.path = /fpm-ping
ping.response = pong

; Pass Docker environment variables to FPM workers
clear_env = no

; Logging
catch_workers_output = yes
decorate_workers_output = no

; Timeouts
request_terminate_timeout = 300
