[www]
user  = appuser
group = appuser

listen = 0.0.0.0:9000

; Process management
pm = dynamic
pm.max_children    = 20
pm.start_servers   = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
; Recycle workers after 500 requests to prevent slow memory leaks
pm.max_requests    = 500

; Health check endpoints (used by Docker HEALTHCHECK and nginx internal location)
pm.status_path = /fpm-status
ping.path      = /fpm-ping
ping.response  = pong

; Pass Docker environment variables through to FPM workers
; Required for Laravel to read APP_KEY, DB_*, REDIS_*, etc.
clear_env = no

; Logging — forward worker stderr to the Docker log driver
catch_workers_output  = yes
decorate_workers_output = no

; Hard kill timeout for stuck workers.
; Aligned with PHP max_execution_time (60s) + a small buffer.
; The previous 300s meant a hung worker blocked a slot for 5 minutes.
request_terminate_timeout = 90
