user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# Do not advertise nginx version in error pages or Server header
server_tokens off;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Structured log format — includes request time for performance monitoring
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile       on;
    tcp_nopush     on;
    tcp_nodelay    on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Prevent clickjacking via X-Frame-Options at http{} level is not done here
    # because it is set per-server block to allow fine-grained control.

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml
        application/wasm;

    # Rate-limit zone for login endpoint: 5 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # Return 429 on rate-limit breach (more correct than 503)
    limit_req_status 429;

    include /etc/nginx/conf.d/*.conf;
}
