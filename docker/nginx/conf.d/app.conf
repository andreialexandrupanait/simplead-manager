server {
    listen 80;
    listen [::]:80;
    server_name manager.simplead.ro _;

    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 100M;
    charset utf-8;

    # Basic security headers (minimal set appropriate for HTTP-only / pre-SSL setup)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Certbot ACME challenge — must remain HTTP-accessible for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Block hidden files (except ACME challenge)
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Block common exploit probes
    location ~ /\.env         { return 404; }
    location ~ /\.git         { return 404; }
    location ~ ^/(wp-admin|wp-login\.php|xmlrpc\.php) { return 404; }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_hide_header X-Powered-By;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }
}
