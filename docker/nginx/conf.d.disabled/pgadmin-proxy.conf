# baza.simplead.ro — reverse proxy to pgAdmin
server {
    listen 80;
    server_name baza.simplead.ro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name baza.simplead.ro;

    ssl_certificate     /etc/letsencrypt/live/baza.simplead.ro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/baza.simplead.ro/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location / {
        proxy_pass http://pgadmin:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering on;
        proxy_buffer_size 32k;
        proxy_buffers 16 16k;
    }
}
