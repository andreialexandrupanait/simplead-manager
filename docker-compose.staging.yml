name: simplead-staging

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
      target: app
    image: simplead-app:staging
    container_name: simplead-staging-app
    env_file:
      - .env.staging
    environment:
      APP_URL: https://staging.simplead.ro
      TRUSTED_PROXIES: "*"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "SCRIPT_NAME=/fpm-ping SCRIPT_FILENAME=/fpm-ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      - app-storage:/var/www/html/storage
    networks:
      - simplead-staging
    depends_on:
      db-proxy:
        condition: service_healthy
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
      - /var/run:size=8M
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  horizon:
    image: simplead-app:staging
    container_name: simplead-staging-horizon
    env_file:
      - .env.staging
    environment:
      APP_URL: https://staging.simplead.ro
      TMPDIR: /var/www/html/storage/app/temp
    restart: unless-stopped
    command: php artisan horizon
    healthcheck:
      test: ["CMD-SHELL", "php artisan horizon:status | grep -q running"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    stop_grace_period: 30s
    volumes:
      - app-storage:/var/www/html/storage
    networks:
      - simplead-staging
    depends_on:
      db-proxy:
        condition: service_healthy
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=256M,mode=1777
      - /var/run:size=8M
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  scheduler:
    image: simplead-app:staging
    container_name: simplead-staging-scheduler
    env_file:
      - .env.staging
    environment:
      APP_URL: https://staging.simplead.ro
    restart: unless-stopped
    command: php artisan schedule:work
    healthcheck:
      test: ["CMD-SHELL", "php -r 'echo 1;'"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - app-storage:/var/www/html/storage
    networks:
      - simplead-staging
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
      - /var/run:size=8M
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  nginx:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
      target: nginx
    image: simplead-nginx:staging
    container_name: simplead-staging-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - app-storage:/var/www/html/storage:ro
      - ./docker/nginx/staging/app.conf:/etc/nginx/conf.d/app.conf:ro
    networks:
      - simplead-staging
    depends_on:
      app:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"

  db-proxy:
    image: edoburu/pgbouncer:latest
    container_name: simplead-staging-pgbouncer
    restart: unless-stopped
    environment:
      DB_USER: "${DB_USERNAME}"
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_HOST: simplead-pgsql
      DB_NAME: simplead_staging
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 50
      DEFAULT_POOL_SIZE: 5
      MIN_POOL_SIZE: 2
      RESERVE_POOL_SIZE: 2
      RESERVE_POOL_TIMEOUT: 3
      SERVER_IDLE_TIMEOUT: 600
      SERVER_LIFETIME: 3600
      LOG_CONNECTIONS: 0
      LOG_DISCONNECTIONS: 0
      AUTH_TYPE: scram-sha-256
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      simplead-staging:
        aliases:
          - pgbouncer
      simplead-manager_simplead:
        aliases: []
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: "0.1"

  redis:
    image: redis:7-alpine
    container_name: simplead-staging-redis
    restart: unless-stopped
    command: >
      sh -c '
      ARGS="--maxmemory 64mb --maxmemory-policy allkeys-lru --appendonly no --save \"\"";
      if [ -n "$$REDIS_PASSWORD" ]; then ARGS="--requirepass $$REDIS_PASSWORD $$ARGS"; fi;
      exec redis-server $$ARGS
      '
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli $${REDIS_PASSWORD:+-a $$REDIS_PASSWORD --no-auth-warning} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - simplead-staging
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 96M
          cpus: "0.25"

networks:
  simplead-staging:
    driver: bridge
  simplead-manager_simplead:
    external: true

volumes:
  app-storage:
    name: simplead-staging_app-storage
